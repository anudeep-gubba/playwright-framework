jobs:
  smoke:
  runs-on: ubuntu-latest

  steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: 20

    - run: npi ci

    - run: px playwright install --with-deps

    - run: npm run smoke

    - uses: actions/upload-artifact@v4
      if: always()
      with:
      name: playwright-report
      path: playwright-report
